# ==========================================
# APPLICATION
# ==========================================
spring.application.name=Backend
server.port=${PORT:8080}

# ==========================================
# DATABASE
# ==========================================
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/online_exam_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ==========================================
# JWT
# ==========================================
app.jwtSecret=${JWT_SECRET:myLocalDevSecretKeyThatIsAtLeast32CharactersLong!}
app.jwtExpirationMs=86400000

# ==========================================
# RESEND EMAIL API CONFIGURATION
# ==========================================
resend.api.key=${RESEND_API_KEY:re_DUQTXCVa_JZ9sikdn5ePzTSMKsAhFMUR7}
resend.from.email=${RESEND_FROM_EMAIL:onboarding@resend.dev}

# ==========================================
# ASYNC EMAIL
# ==========================================
spring.task.execution.pool.core-size=2
spring.task.execution.pool.max-size=5
spring.task.execution.pool.queue-capacity=100
spring.task.execution.thread-name-prefix=email-async-