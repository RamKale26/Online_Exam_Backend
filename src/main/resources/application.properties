# ==========================================
# APPLICATION
# ==========================================
spring.application.name=Backend
server.port=${PORT:8080}

# ==========================================
# DATABASE
# ==========================================
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/online_exam_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ==========================================
# JWT
# ==========================================
app.jwtSecret=${JWT_SECRET:myLocalDevSecretKeyThatIsAtLeast32CharactersLong!}
app.jwtExpirationMs=86400000

# ==========================================
# BREVO SMTP CONFIGURATION
# ==========================================
spring.mail.host=smtp-relay.brevo.com
spring.mail.port=587
spring.mail.username=${BREVO_USERNAME}
spring.mail.password=${BREVO_SMTP_KEY}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000

mail.from=${MAIL_FROM}

# ==========================================
# ASYNC EMAIL
# ==========================================
spring.task.execution.pool.core-size=2
spring.task.execution.pool.max-size=5
spring.task.execution.pool.queue-capacity=100
spring.task.execution.thread-name-prefix=email-async-