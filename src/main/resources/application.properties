
spring.application.name=Backend
server.port=${PORT:8080}

# Database Configuration
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/online_exam_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT Configuration
app.jwtSecret=${JWT_SECRET:myLocalDevSecretKeyThatIsAtLeast32CharactersLong!}
app.jwtExpirationMs=86400000

# ===================================================
# EMAIL CONFIGURATION (Gmail SMTP)
# IMPORTANT: You MUST set these two values:
#   MAIL_USERNAME  -> your Gmail address (e.g. yourname@gmail.com)
#   MAIL_PASSWORD  -> Gmail App Password (NOT your real Gmail password)
#
# To create a Gmail App Password:
#   1. Go to: https://myaccount.google.com/security
#   2. Enable 2-Step Verification if not already enabled
#   3. Go to: https://myaccount.google.com/apppasswords
#   4. Create app password for "Mail" -> copy the 16-char password
#   5. Set it as MAIL_PASSWORD environment variable
#
# Run locally:  $env:MAIL_USERNAME="you@gmail.com"; $env:MAIL_PASSWORD="abcd efgh ijkl mnop"; .\mvnw.cmd spring-boot:run
# ===================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:ramkale3125@gmail.com}
spring.mail.password=${MAIL_PASSWORD:YOUR_BREVO_API_KEY_HERE}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.enable=false
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000

# Async thread pool for email sending
spring.task.execution.pool.core-size=2
spring.task.execution.pool.max-size=5
spring.task.execution.pool.queue-capacity=100
spring.task.execution.thread-name-prefix=email-async-