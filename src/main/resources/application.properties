# ==========================================
# APPLICATION
# ==========================================
spring.application.name=Backend
server.port=${PORT:8080}

# ==========================================
# DATABASE
# ==========================================
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/online_exam_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ==========================================
# JWT
# ==========================================
app.jwtSecret=${JWT_SECRET:myLocalDevSecretKeyThatIsAtLeast32CharactersLong!}
app.jwtExpirationMs=86400000

# ==========================================
# GMAIL SMTP (SSL - Port 465)
# ==========================================
spring.mail.host=smtp.gmail.com
spring.mail.port=465

spring.mail.username=${MAIL_USERNAME:kaleramnath2000@gmail.com}
spring.mail.password=${MAIL_PASSWORD:pzzocxaeelpkvmeb}

spring.mail.protocol=smtp

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.starttls.enable=false

spring.mail.properties.mail.smtp.connectiontimeout=30000
spring.mail.properties.mail.smtp.timeout=30000
spring.mail.properties.mail.smtp.writetimeout=30000

# ==========================================
# ASYNC EMAIL
# ==========================================
spring.task.execution.pool.core-size=2
spring.task.execution.pool.max-size=5
spring.task.execution.pool.queue-capacity=100
spring.task.execution.thread-name-prefix=email-async-